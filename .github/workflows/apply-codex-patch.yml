name: Apply Codex estimator patch

on:
  push:
    branches: [test-wasm-optimizer]

permissions:
  contents: write

jobs:
  apply:
    if: github.ref == 'refs/heads/test-wasm-optimizer'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: test-wasm-optimizer
      - name: Apply patch and remove temporary workflow
        shell: bash
        run: |
          cat > /tmp/codex-estimator.patch <<'PATCH'
